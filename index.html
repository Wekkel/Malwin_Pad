<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALWINIZER - ARC2 Classic Look</title>
    <style>
        /* Terug naar de klassieke ARC kleuren: Marineblauw met de witte banier */
        body { 
            font-family: 'Courier New', Courier, monospace;
            padding: 0; margin: 0; 
            background-color: #000040; 
            background-image: linear-gradient(0deg, #000040 0%, #000040 40%, #ffffff 40%, #ffffff 60%, #000040 60%, #000040 100%);
            background-attachment: fixed;
            color: #ffffff; text-align: center; min-height: 100vh;
        }

        .main-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .box { 
            max-width: 550px; width: 100%;
            background: rgba(0, 0, 0, 0.9); 
            padding: 30px; border-radius: 10px; 
            border: 3px solid #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        h1 { font-size: 2.8em; margin: 0; color: #ffffff; text-transform: uppercase; }
        .subtitle { margin-top: 0; color: #00ad36; font-weight: bold; font-size: 0.9em; letter-spacing: 1px; }

        textarea { 
            width: 100%; height: 120px; 
            margin: 15px 0; border-radius: 5px; border: 2px solid #ffffff; 
            padding: 12px; box-sizing: border-box; font-size: 16px; 
            background-color: #111; color: #00ff00; font-family: monospace;
            resize: none;
        }

        button { 
            color: white; border: none; padding: 18px; width: 100%; 
            border-radius: 5px; font-weight: bold; cursor: pointer; 
            margin-top: 10px; font-size: 18px; text-transform: uppercase;
        }

        .btn-translate { background-color: #d30731; }
        .btn-translate:hover { background-color: #b00628; }

        .btn-whatsapp { background-color: #25D366; margin-top: 15px; }
        .btn-whatsapp:hover { background-color: #1da851; }

        #output { 
            margin-top: 25px; background: #ffffff; color: #000000; 
            padding: 20px; border-radius: 5px; text-align: left; 
            min-height: 80px; font-weight: bold; font-size: 1.3em;
            line-height: 1.4; border-left: 10px solid #00ad36;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="box">
            <h1>MALWINIZER</h1>
            <p class="subtitle">ARC2 TOUR BANTER ENGINE</p>
            
            <textarea id="input" placeholder="Typ je NL of EN onzin hier..."></textarea>

            <button class="btn-translate" onclick="malwinize()">MAAK HET RIDICUUL</button>
            <button class="btn-whatsapp" onclick="shareWhatsApp()">GOOI IN WHATSAPP</button>

            <div id="output">Resultaat verschijnt hier, boyo...</div>
        </div>
    </div>

    <script>
        function malwinize() {
            const input = document.getElementById('input').value;
            if (!input) return;

            // Opschonen van input voor betere match
            let text = " " + input.toLowerCase() + " ";

            const dict = {
                // --- BASIS GRAMMATICA (HARRIEPAD) ---
                "ik": "ma-self", "i": "i-ya", "jij": "ew", "you": "ew-self", "hij": "that boyo", "he": "that mush",
                "zij": "the missus", "she": "the gaffer", "wij": "us lot", "we": "the boys", "jullie": "you bunch of daft aps",
                "is": "iz", "ben": "am", "are": "be", "was": "wuzz", "waren": "wuzz",
                "de": "the", "het": "the", "een": "a tidy", "the": "the", "a": "a proper",
                "mijn": "ma", "my": "ma", "jouw": "ewr", "your": "ewr", "van": "o'", "of": "o'",
                "naar": "down to", "to": "over to", "met": "wiv", "with": "wiv", "voor": "fer", "for": "fer",
                "niet": "not", "no": "no way boyo", "nee": "never-mun", "yes": "aye", "ja": "aye-aye",
                "maar": "but-ty", "but": "however-mun", "want": "coz", "because": "since-innit",
                "ook": "as-well-innit", "also": "too-mun", "nu": "now in a minute", "now": "now in a minute",
                "wat": "what-the-hell", "what": "wot-mush",

                // --- MANAGEMENT & BESTUUR ---
                "board": "the blazer-wearing overlords", "bestuur": "the committee of dinosaurs",
                "tc": "the theoretical clowns", "technische commissie": "the high council of excuses",
                "secretary": "the paper-shuffler", "match secretary": "the fixture wizard (drunk)",
                "wedstrijdsecretaris": "the guy who hates us", "team manager": "the kit-carrying legend",
                "manager": "the spreadsheet gaffer", "coach": "the tactical fossil",
                "trainer": "the man with the annoying whistle", "captain": "the weary gaffer",

                // --- RUGBY & VELD ---
                "rugby": "the real game", "game": "80 mins of chaos", "match": "the weekly brawl",
                "wedstrijd": "the sunday struggle", "ball": "the leather egg", "bal": "het ei",
                "try": "five-point meat pie", "scrum": "the sweaty cuddle-puddle",
                "line-out": "the jumpy-jumpy nonsense", "tackle": "clobbering the poor mush",
                "opponent": "the targets", "tegenstander": "the victims, innit",
                "referee": "the blind bloke in neon", "scheids": "steve wonder's cousin",
                "home": "at the holy grounds", "away": "on safari in the sticks",
                "injury": "a dramatic football-style fall", "blessure": "acting like a softie",
                "sin bin": "the naughty chair",

                // --- MALWIN ROASTS (LENGTE / WOKE) ---
                "klein": "grass-grazer height", "short": "pocket-sized mush", "tall": "vertically ambitious",
                "length": "micro-stature", "lengte": "diminutive presence, fairplay", "niet lang": "closer to the ground than a badger",
                "small": "handy for hiding in scrums", "groot": "massive (only in his dreams)",
                "woke": "that modern snowflake nonsense", "political": "the lying suits", "politiek": "government madness",
                "society": "this soft-world mess", "samenleving": "offended-by-everything-land",
                "diversiteit": "everyone's ace if they play rugby",

                // --- WALES & TRAGEDIE ---
                "wales": "the land of sheep and wooden spoons", "welsh": "unintelligible gabbing",
                "six nations": "the annual heart-break festival", "gatland": "the man who lost his wand",
                "dragon": "the lizard that lost its fire", "sheep": "the proper welsh girlfriend",
                "win": "a rare bloody miracle", "lose": "doing a classic wales",

                // --- DRANK & TOUR ---
                "beer": "pints of Brains SA", "bier": "liquid gold from the valleys", "pils": "fizzy water for footballers",
                "zuipen": "getting absolutely plastered", "drink": "having a tidy swig",
                "drunk": "three sheets to the wind", "dronken": "proper steaming, fairplay",
                "kroeg": "the watering hole", "tour": "the descent into madness",
                "proost": "iechyd da!", "lekker": "proper lush", "good": "tidy", "mooi": "mint",
                "bad": "stinkin'", "vies": "clart", "shit": "ych a fi"
            };

            // 1. Vervang woorden uit de dikke dictionary
            for (let [key, val] of Object.entries(dict)) {
                let re = new RegExp("\\b" + key + "\\b", "gi");
                text = text.replace(re, val);
            }

            // 2. Fonetische filters (Harriepad stijl)
            text = text.replace(/ing\b/g, "in'"); 
            text = text.replace(/er\b/g, "ah");
            text = text.replace(/th/g, "f");

            // 3. Willekeurige Welsh Injecties
            const fillers = [" mun", " boyo", " isn't it", " fairplay", " simple as", " to be honest", " ych a fi"];
            let sentences = text.trim().split('.');
            text = sentences.map(s => {
                if (s.trim().length < 4) return s;
                let filler = fillers[Math.floor(Math.random() * fillers.length)];
                return s.trim() + filler;
            }).join('. ');

            // Hoofdletter & Punt fixen
            let finalResult = text.trim().charAt(0).toUpperCase() + text.trim().slice(1);
            if (!finalResult.endsWith('.') && !finalResult.endsWith('?') && !finalResult.endsWith('!')) finalResult += ".";

            document.getElementById('output').innerText = finalResult;
        }

        function shareWhatsApp() {
            const text = document.getElementById('output').innerText;
            if (text && !text.includes("verschijnt hier")) {
                const url = "https://wa.me/?text=" + encodeURIComponent(text);
                window.open(url, '_blank');
            }
        }
    </script>
</body>
</html>
