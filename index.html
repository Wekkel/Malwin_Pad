<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welshizer</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #d30731; color: white; text-align: center; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; border-radius: 8px; border: none; padding: 10px; }
        button { background: #00ad36; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .result { margin-top: 20px; background: white; color: black; padding: 15px; border-radius: 8px; min-height: 50px; }
    </style>
</head>
<body>
    <h1>🏴󠁧󠁢󠁷󠁬󠁳󠁿 Welshizer</h1>
    <textarea id="input" placeholder="Typ je tekst (Engels/Nederlands)..."></textarea>
    <br>
    <button onclick="translate()">Maak het Plat Welsh</button>
    <div class="result" id="output">Resultaat verschijnt hier...</div>

    <script>
        const dictionary = {
            "hello": "alright butt",
            "friend": "mush",
            "good": "tidy",
            "very good": "proper lush",
            "nice": "lush",
            "great": "ace",
            "idiot": "daft ap",
            "disgusting": "ych a fi",
            "now": "now in a minute",
            "coffee": "cup of tea",
            "yes": "aye",
            "please": "please now",
            "beer": "pints"
        };

        function translate() {
            let text = document.getElementById('input').value.toLowerCase();
            
            // Simpele vervanging
            for (const [key, value] of Object.entries(dictionary)) {
                let re = new RegExp(key, "g");
                text = text.replace(re, value);
            }

            // Voeg de typische 'isn't it' of 'boyo' toe aan het eind
            text = text + ", isn't it, boyo?";
            
            document.getElementById('output').innerText = text;
        }
    </script>
</body>
</html>
