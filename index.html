<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malwinizer - Welsh Translator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #d30731; color: white; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; background: rgba(0,0,0,0.1); padding: 20px; border-radius: 15px; }
        textarea { width: 90%; height: 100px; margin-bottom: 10px; border-radius: 8px; border: 2px solid #00ad36; padding: 10px; font-size: 16px; }
        button { background: #00ad36; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; width: 95%; margin-bottom: 10px; }
        button:active { background: #008a2b; }
        .result-box { margin-top: 20px; background: white; color: black; padding: 15px; border-radius: 8px; min-height: 50px; text-align: left; word-wrap: break-word; }
        .wa-btn { background: #25D366; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏴󠁧󠁢󠁷󠁬󠁳󠁿 Malwinizer</h1>
        <p>Maak je tekst "Proper Welsh", isn't it?</p>
        <textarea id="inputField" placeholder="Typ je tekst hier..."></textarea>
        <br>
        <button onclick="welshifyText()">Maak het Plat Welsh</button>
        <button class="wa-btn" onclick="shareWhatsApp()">Deel in de Groep</button>
        
        <div class="result-box" id="outputField">Resultaat verschijnt hier...</div>
    </div>

    <script>
    function startVertaalMachine() {
        const inputElement = document.getElementById('input');
        const outputElement = document.getElementById('output');
        
        let text = inputElement.value.toLowerCase();
        if (!text) return;

        // Uitgebreide Nederlands/Engels naar Welsh Dictionary
        const dict = {
            // Begroetingen & Personen
            "hallo": "alright butt",
            "hey": "alright mush",
            "morgen": "bore da, boyo",
            "vriend": "butt",
            "maat": "boyo",
            "gast": "mush",
            "kerel": "fella",
            "team": "the boys",
            "vrouw": "missus",

            // Adjectieven (De 'Lush' factor)
            "lekker": "proper lush",
            "mooi": "tidy",
            "goed": "ace",
            "geweldig": "mint",
            "slecht": "stinkin'",
            "vies": "ych a fi",
            "heet": "boiling, mun",
            "koud": "freezing, isn't it",

            // Rugby & Bier
            "bier": "pints",
            "pils": "Brains",
            "zuipen": "on the lash",
            "rugby": "the real game",
            "scheids": "blind ref",
            "bal": "egg",
            "proost": "iechyd da!",

            // Werkwoorden & Zinnen
            "gaan": "heading down",
            "kijken": "have a look-see",
            "wachten": "hang on a minute",
            "nu": "now in a minute",
            "ja": "aye",
            "nee": "no way, mun",
            "bedankt": "diolch, butt",
            "doei": "ta-ra then"
        };

        // Loop door de woordenlijst
        for (let [key, val] of Object.entries(dict)) {
            let re = new RegExp("\\b" + key + "\\b", "gi");
            text = text.replace(re, val);
        }

        // De Welsh "finish" (voegt altijd een typische afsluiter toe)
        const finishers = [
            ", isn't it, boyo?",
            ", fairplay.",
            ", simple as.",
            ", to be honest with you.",
            ", you know what I mean, mush?"
        ];
        const randomFinish = finishers[Math.floor(Math.random() * finishers.length)];

        // Resultaat tonen (Eerste letter hoofdletter)
        const finalResult = text.charAt(0).toUpperCase() + text.slice(1) + randomFinish;
        outputElement.innerText = finalResult;
    }

    function shareWhatsApp() {
        const text = document.getElementById('output').innerText;
        if (text && text !== "Resultaat verschijnt hier...") {
            // Opent WhatsApp met de gegenereerde tekst
            const url = "https://wa.me/?text=" + encodeURIComponent(text);
            window.open(url, '_blank');
        }
    }
</script>
</body>
</html>
