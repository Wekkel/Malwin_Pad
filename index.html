<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALWINIZER 3000 - ARC2</title>
    <style>
        body { 
            font-family: 'Arial Black', Gadget, sans-serif;
            padding: 0; margin: 0; 
            background-color: #000040; 
            background-image: linear-gradient(180deg, #000040 0%, #000040 45%, #ffffff 45%, #ffffff 55%, #000040 55%, #000040 100%);
            background-attachment: fixed;
            color: #ffffff; text-align: center; min-height: 100vh;
        }
        .main-container { display: flex; justify-content: center; padding: 20px; }
        .box { 
            max-width: 600px; width: 100%;
            background: rgba(0, 0, 0, 0.95); 
            padding: 30px; border-radius: 5px; 
            border: 4px solid #ffffff;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        h1 { font-size: 3em; margin: 0; color: #ffffff; -webkit-text-stroke: 1px #00ad36; }
        .tagline { color: #ffffff; font-weight: bold; margin-bottom: 20px; background: #00ad36; display: inline-block; padding: 5px 15px; }
        textarea { 
            width: 100%; height: 150px; 
            margin: 10px 0; border: 2px solid #ffffff; 
            padding: 15px; box-sizing: border-box; font-size: 18px; 
            background-color: #000; color: #00ff00; font-family: monospace;
        }
        button { 
            color: white; border: none; padding: 20px; width: 100%; 
            font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 20px; 
            text-transform: uppercase;
        }
        .btn-translate { background-color: #d30731; }
        .btn-whatsapp { background-color: #25D366; color: #000; }
        #output { 
            margin-top: 30px; background: #fff; color: #000; 
            padding: 25px; border-radius: 0; text-align: left; 
            min-height: 80px; font-weight: bold; font-size: 1.4em;
            line-height: 1.3; border-left: 15px solid #d30731;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="box">
            <h1>MALWINIZER</h1>
            <div class="tagline">OFFICIAL ARC2 BANTER TOOL</div>
            
            <textarea id="input" placeholder="Typ je NL/EN onzin hier..."></textarea>

            <button class="btn-translate" onclick="malwinize()">MAAK HET ONVERSTAANBAAR</button>
            <button class="btn-whatsapp" onclick="shareWhatsApp()">GOOI IN WHATSAPP</button>

            <div id="output">Wachtend op input van de boys...</div>
        </div>
    </div>

    <script>
        function malwinize() {
            const input = document.getElementById('input').value;
            if (!input) return;

            let text = " " + input.toLowerCase() + " ";

            const dict = {
                // --- MANAGEMENT & ORGANISATIE ---
                "board": "the clipboard overlords",
                "bestuur": "the blazer-wearing dictators",
                "tc": "the theoretical experts",
                "technische commissie": "the high council of excuses",
                "match secretary": "the fixture wizard",
                "wedstrijdsecretaris": "the man with the magic pen",
                "team manager": "the kit-carrying legend",
                "manager": "the spreadsheet gaffer",
                "coach": "the tactical dinosaur",
                "trainer": "the whistle-blower",

                // --- HET SPEL & VELD ---
                "try": "five-point meat pie",
                "opponent": "the poor sheep in jerseys",
                "tegenstander": "victims-to-be, innit",
                "game": "80 mins of chaos",
                "wedstrijd": "the weekly struggle",
                "match": "the grand clash",
                "uitwedstrijd": "the long tour to the sticks",
                "away game": "a safari in the valleys",
                "thuiswedstrijd": "the back garden brawl",
                "home game": "playing in the backyard, tidy",
                "injury": "a bit of a dramatic niggle",
                "blessure": "acting like a footballer, ych a fi",
                "scrum": "the sweaty cuddle-puddle",
                "line-out": "the jumpy-jumpy nonsense",
                "referee": "blind bloke in neon",
                "scheids": "steve wonder's cousin",
                "ball": "the egg", "bal": "the egg",

                // --- DE PERSOON (MALWIN ROASTS) ---
                "klein": "eye-level with the grass",
                "short": "vertically challenged mush",
                "length": "pocket-sized stature",
                "lengte": "diminutive presence, fairplay",
                "niet lang": "closer to the ground than most",
                "groot": "massive (only in his mind)",
                "woke": "that modern snowflake nonsense",
                "politiek": "the liars in suits",
                "society": "this soft-world mess",
                "samenleving": "everyone being offended, innit",
                "diversiteit": "all the boys included, simple as",

                // --- WALES & RUGBY TRAGEDIE ---
                "wales": "the land of sheep and wooden spoons",
                "welsh": "unintelligible gabbing",
                "six nations": "the annual heart-break",
                "world cup": "a distant dream, mun",
                "gatland": "the man who lost the plot",
                "win": "a rare bloody miracle",
                "lose": "the standard welsh outcome",
                "verliezen": "classic wales behavior",

                // --- DRANK & HUMOR ---
                "bier": "proper pints of Brains SA",
                "beer": "liquid gold from the valleys",
                "pils": "fizzy water for softies",
                "zuipen": "getting absolutely plastered",
                "drink": "having a tidy swig",
                "drunk": "three sheets to the wind",
                "dronken": "steaming, fairplay",
                "lekker": "proper lush", "good": "tidy", "mooi": "mint",
                "slecht": "stinkin'", "vies": "clart", "shit": "ych a fi",

                // --- FONETISCHE VERBASTERINGEN (NL/EN) ---
                "ik": "ma-self", "i": "i-ya",
                "jij": "ew", "you": "ewr-self",
                "hij": "that boyo", "he": "that mush",
                "wij": "the boys", "we": "us lot",
                "is": "iz", "ben": "am", "are": "be",
                "het": "the", "de": "the", "een": "a tidy",
                "the": "the", "a": "a proper",
                "naar": "down to", "to": "over to",
                "met": "wiv", "with": "wiv",
                "maar": "but-ty", "but": "however-mun",
                "niet": "not", "no": "no way boyo",
                "ja": "aye", "yes": "aye-aye butt",
                "omdat": "coz", "because": "since-innit",
                "nu": "now in a minute", "now": "now in a minute",
                "gaan": "heading", "going": "goin'",
                "doen": "doin'", "doing": "doin'",
                "hebben": "havin'", "have": "got",
                "altijd": "always-innit", "always": "constantly-mun",
                "thanks": "diolch mush", "bedankt": "diolch butt"
            };

            // Eerst de specifieke lange zinnen/woorden vervangen
            for (let [key, val] of Object.entries(dict)) {
                let re = new RegExp("\\b" + key + "\\b", "gi");
                text = text.replace(re, val);
            }

            // Fonetische extra's
            text = text.replace(/ing\b/g, "in'");
            text = text.replace(/er\b/g, "ah");

            // Random Welsh fillers per zin
            const fillers = [" mun", " boyo", " isn't it", " fairplay", " simple as", " to be honest", " ych a fi"];
            let sentences = text.trim().split('.');
            text = sentences.map(s => {
                if (s.trim().length < 5) return s;
                let filler = fillers[Math.floor(Math.random() * fillers.length)];
                return s.trim() + filler;
            }).join('. ');

            let finalResult = text.charAt(0).toUpperCase() + text.slice(1);
            if (!finalResult.endsWith('.') && !finalResult.endsWith('?')) finalResult += ".";

            document.getElementById('output').innerText = finalResult;
        }

        function shareWhatsApp() {
            const text = document.getElementById('output').innerText;
            if (text && !text.includes("Wachtend")) {
                const url = "https://wa.me/?text=" + encodeURIComponent(text);
                window.open(url, '_blank');
            }
        }
    </script>
</body>
</html>
